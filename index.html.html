<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Retirada de Kits Pro</title>
<script src='https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js'></script>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#e5e7eb}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:#111827;border-radius:18px;padding:18px;box-shadow:0 8px 30px rgba(0,0,0,.25)}
input,button{padding:12px;border-radius:10px;border:0;font-size:16px}
input{width:100%;margin:8px 0}
.grid{display:grid;grid-template-columns:1fr 1.3fr;gap:18px}
.list{max-height:520px;overflow:auto}
.item{padding:12px;border-bottom:1px solid #1f2937;cursor:pointer}
.item:hover{background:#1f2937}
.btn{background:#2563eb;color:#fff;cursor:pointer}
.danger{background:#dc2626}.ok{background:#16a34a}
.top{display:flex;justify-content:space-between;gap:10px;align-items:center}
.big{font-size:28px;font-weight:700}.warn{color:#f87171;font-weight:700}
</style>
</head>
<body>
<div class='wrap'>
<div class='top'>
<div class='big'>Retirada de Kits</div>
<div>Kits entregues: <span id='contador'>0</span></div>
</div>
<div class='card'>
<input type='file' id='file'>
<input id='busca' placeholder='Buscar nome, número ou CPF'>
</div>
<div class='grid' style='margin-top:18px'>
<div class='card list' id='lista'></div>
<div class='card' id='painel'>Selecione um atleta</div>
</div>
<div style='margin-top:18px;display:flex;gap:10px'>
<button class='btn ok' onclick='exportar()'>Exportar Excel</button>
<button class='btn' onclick='fullscreenApp()'>Tela Cheia</button>
<button class='btn danger' onclick='resetar()'>Resetar</button>
</div>
</div>
<script>
let data=[];
let atual=null;
let audioCtx=null;
const KEY='kits_backup';

const elContador=document.getElementById('contador');
const elFile=document.getElementById('file');
const elBusca=document.getElementById('busca');
const elLista=document.getElementById('lista');
const elPainel=document.getElementById('painel');

function save(){localStorage.setItem(KEY,JSON.stringify(data));upd();}
function upd(){elContador.innerText=data.filter(x=>x.kit_retirado==='SIM').length;}
function merge(n){const old=JSON.parse(localStorage.getItem(KEY)||'[]');n.forEach(r=>{const a=old.find(x=>x.numero==r.numero);if(a)Object.assign(r,a)});return n;}

elFile.addEventListener('change',e=>{
 const fr=new FileReader();
 fr.onload=x=>{
  const wb=XLSX.read(x.target.result,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  data=merge(XLSX.utils.sheet_to_json(ws));
  save();
  alert('Planilha carregada');
 };
 fr.readAsArrayBuffer(e.target.files[0]);
});

elBusca.addEventListener('input',()=>{
 const t=elBusca.value.toLowerCase().trim();
 elLista.innerHTML='';
 if(!t)return;
 data.filter(p=>String(p.nome||'').toLowerCase().includes(t)||String(p.numero||'').toLowerCase().includes(t)||String(p.cpf||'').toLowerCase().includes(t))
 .slice(0,100)
 .forEach(p=>{
   const d=document.createElement('div');
   d.className='item';
   d.innerHTML='<b>'+(p.nome||'Sem nome')+'</b><br>Nº '+(p.numero||'');
   d.addEventListener('click',()=>show(p.numero));
   elLista.appendChild(d);
 });
});

function show(n){
 const p=data.find(x=>x.numero==n);
 if(!p)return;
 atual=p;
 const r=p.kit_retirado==='SIM';
 elPainel.innerHTML=`<div class='big'>${p.nome||''}</div>
 <p>Número: ${p.numero||''}</p>
 <p>CPF: ${p.cpf||''}</p>
 <p>Status: ${r?"<span class='warn'>RETIRADO</span>":'PENDENTE'}</p>
 <button class='btn ok' onclick='retirar(${JSON.stringify(p.numero)})'>Retirar</button>
 <button class='btn danger' onclick='devolver(${JSON.stringify(p.numero)})'>Devolver</button>`;
}

function retirar(n){const p=data.find(x=>x.numero==n);if(!p)return;beep();p.kit_retirado='SIM';p.data_retirada=new Date().toLocaleString();save();show(n);}
function devolver(n){const p=data.find(x=>x.numero==n);if(!p)return;p.kit_retirado='';save();show(n);}

function exportar(){const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Kits');XLSX.writeFile(wb,'controle_kits_atualizado.xlsx');}
function fullscreenApp(){if(document.documentElement.requestFullscreen){document.documentElement.requestFullscreen();}}
function resetar(){if(confirm('Apagar dados salvos?')){localStorage.removeItem(KEY);location.reload();}}

function beep(){
 try{
  audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended'){audioCtx.resume();}
  const a=audioCtx;
  const o=a.createOscillator();
  const g=a.createGain();
  o.type='square';
  o.frequency.setValueAtTime(1200,a.currentTime);
  o.frequency.exponentialRampToValueAtTime(700,a.currentTime+0.12);
  g.gain.value=0.08;
  o.connect(g); g.connect(a.destination);
  o.start(); o.stop(a.currentTime+0.12);
 }catch(e){}
}

document.addEventListener('click',function(){
 try{
  audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended'){audioCtx.resume();}
 }catch(e){}
},{once:true});

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&atual)retirar(atual.numero);});
setInterval(save,30000);
data=JSON.parse(localStorage.getItem(KEY)||'[]');
upd();
</script>
</body>
</html>
